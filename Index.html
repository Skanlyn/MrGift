<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Gifting Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
    background:#0b0c0f;
    color:white;
}

.navbar{
    height:60px;
    background:#0f1115;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    border-bottom:1px solid #1f2329;
}

.logo{font-size:22px;font-weight:700;letter-spacing:2px}

.balance{
    background:#1a1d23;
    padding:8px 15px;
    border-radius:8px;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.title{
    font-size:34px;
    font-weight:700;
    margin-bottom:20px;
}

.card{
    background:#12141a;
    border:1px solid #1f2329;
    border-radius:12px;
    padding:25px;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    background:#0f1115;
    border:1px solid #1f2329;
    border-radius:8px;
    color:white;
    margin-top:10px;
    margin-bottom:15px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.search-btn{background:#2563eb;color:white;width:100%}

.user-result{
    display:flex;
    align-items:center;
    padding:12px;
    border:1px solid #1f2329;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    transition:0.2s;
}

.user-result:hover{background:#1a1d23}

.user-result img{
    width:50px;
    height:50px;
    border-radius:50%;
    margin-right:15px;
}

.selected{
    border:2px solid #2563eb;
    background:#1a1d23;
}

.send-btn{
    background:#22c55e;
    color:white;
    width:100%;
    margin-top:10px;
}

.loading{
    text-align:center;
    padding:20px;
    display:none;
}

.success{
    text-align:center;
    color:#22c55e;
    font-weight:600;
    display:none;
}

</style>
</head>
<body>

<div class="navbar">
    <div class="logo">ROBLOX</div>
    <div class="balance">Balance: <span id="balance">5000</span> Robux</div>
</div>

<div class="container">

    <div class="title">Gift Robux</div>

    <div class="card">
        <h3>Search User</h3>
        <input id="username" placeholder="Enter Roblox username">
        <button class="search-btn" onclick="searchUser()">Search</button>
        <div id="results"></div>
    </div>

    <div class="card">
        <h3>Select Amount</h3>
        <select id="amount">
            <option value="500">500 Robux</option>
            <option value="1000">1000 Robux</option>
            <option value="2000">2000 Robux</option>
            <option value="5000">5000 Robux</option>
        </select>
        <button class="send-btn" onclick="sendGift()">Send Gift</button>
    </div>

    <div class="loading" id="loading">Sending Gift...</div>
    <div class="success" id="success">Gift Sent Successfully!</div>

</div>

<script>
let selectedUser = null;
let robuxBalance = 5000;

async function searchUser(){
    const username = document.getElementById('username').value;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = 'Searching...';

    try{
        const res = await fetch(`https://users.roblox.com/v1/users/search?keyword=${username}&limit=5`);
        const data = await res.json();

        resultsDiv.innerHTML = '';

        data.data.forEach(user=>{
            const div = document.createElement('div');
            div.className = 'user-result';

            div.innerHTML = `
                <img src="https://www.roblox.com/headshot-thumbnail/image?userId=${user.id}&width=150&height=150&format=png">
                <div>
                    <div>${user.name}</div>
                    <div style='color:#b0b3b8;font-size:13px'>${user.displayName}</div>
                </div>
            `;

            div.onclick = ()=>{
                document.querySelectorAll('.user-result').forEach(e=>e.classList.remove('selected'));
                div.classList.add('selected');
                selectedUser = user;
            };

            resultsDiv.appendChild(div);
        });

    }catch(e){
        resultsDiv.innerHTML = 'Failed to load users';
    }
}

function sendGift(){
    if(!selectedUser){
        alert('Select a user');
        return;
    }

    const amount = parseInt(document.getElementById('amount').value);

    if(robuxBalance < amount){
        alert('Not enough Robux');
        return;
    }

    document.getElementById('loading').style.display='block';
    document.getElementById('success').style.display='none';

    setTimeout(()=>{
        robuxBalance -= amount;
        document.getElementById('balance').innerText = robuxBalance;

        document.getElementById('loading').style.display='none';
        document.getElementById('success').style.display='block';

    },2000);
}
</script>

</body>
</html>
